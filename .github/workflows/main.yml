name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y git zip unzip python3-pip openjdk-17-jdk
        pip install buildozer cython kivy

    - name: Build APK
      run: |
        buildozer init
        buildozer -v android debug
